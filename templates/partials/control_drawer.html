<!-- Control Panel Drawer -->
<div id="control-panel-overlay" class="fixed inset-0 bg-black/40 hidden z-40"></div>
<aside id="control-panel" class="fixed top-0 right-0 h-full w-80 max-w-full bg-white shadow-xl translate-x-full transition-transform duration-200 z-50">
    <div class="p-4 border-b flex items-center justify-between">
        <h3 class="text-lg font-semibold">Control Panel</h3>
        <button id="control-panel-close" class="text-gray-500 hover:text-gray-700">✕</button>
    </div>
    <div class="p-4 space-y-5 overflow-y-auto h-full">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Service</label>
            <select id="control-service" class="w-full px-3 py-2 border border-gray-300 rounded">
                <option value="spotify">Spotify</option>
                <option value="applemusic">Apple Music</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Speakers</label>
            <div id="control-speakers-list" class="max-h-40 overflow-y-auto border rounded bg-gray-50 px-2 py-1 flex flex-col gap-1 text-sm"></div>
            <div class="text-xs text-gray-500 mt-1">Select speakers for live control.</div>
        </div>

        <div class="flex gap-2">
            <button id="control-connect" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded">Connect</button>
            <button id="control-disconnect" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-2 rounded">Disconnect</button>
        </div>

        <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Playback</label>
            <div class="flex gap-2">
                <button id="control-play" class="flex-1 bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded">Play / Resume</button>
                <button id="control-pause" class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-2 rounded">Pause</button>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Saved Playlist (optional)</label>
                <select id="control-playlist" class="w-full px-3 py-2 border border-gray-300 rounded">
                    <option value="">Play current / last</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Volume</label>
            <input id="control-volume" type="range" min="0" max="100" value="50" class="w-full">
            <div class="text-xs text-gray-600 text-center mt-1">
                <span id="control-volume-display">50%</span>
            </div>
        </div>

        <button id="control-volume-apply" class="w-full bg-purple-600 hover:bg-purple-700 text-white px-3 py-2 rounded">
            Apply Volume
        </button>
    </div>
</aside>
