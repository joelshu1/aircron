<!-- Header -->
<header class="bg-blue-600 text-white shadow-lg">
    <div class="main-container py-4">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">AirCron</h1>
            <div class="flex space-x-2">
                <button 
                    onclick="window.AirCron.refreshSpeakers()"
                    class="bg-blue-500 hover:bg-blue-400 px-3 py-1 rounded transition"
                >
                    🔄 Refresh Devices
                </button>
                <button 
                    onclick="window.AirCron.toggleControlPanel(true)"
                    class="bg-gray-900 hover:bg-gray-800 px-3 py-1 rounded transition"
                >
                    🎛 Control Panel
                </button>
            </div>
        </div>
        <div id="status-message" class="mt-2"></div>
    </div>
</header>
